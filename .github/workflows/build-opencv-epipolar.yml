name: Build OpenCV.js (Epipolar)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 cmake ninja-build build-essential git nodejs

      - name: Clone OpenCV source
        run: |
          git clone --depth 1 --branch 4.13.0 https://github.com/opencv/opencv.git opencv

      - name: Patch out deprecated Emscripten flag (DEMANGLE_SUPPORT)
        run: |
          echo "Before patch:"
          grep -R --line-number "DEMANGLE_SUPPORT" opencv | head -n 50 || true

          find opencv -type f \( -name "*.cmake" -o -name "*.txt" -o -name "*.py" -o -name "*.in" -o -name "CMakeLists.txt" \) \
            -print0 | xargs -0 sed -i 's/-s[ ]*DEMANGLE_SUPPORT=1//g; s/-sDEMANGLE_SUPPORT=1//g; s/DEMANGLE_SUPPORT=1//g'

          echo "After patch:"
          grep -R --line-number "DEMANGLE_SUPPORT" opencv | head -n 50 || true

      - name: Patch OpenCV.js whitelist to include epipolar functions (regex robust)
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          cfg = Path("opencv/platforms/js/opencv_js.config.py")
          txt = cfg.read_text(encoding="utf-8")

          need = [
            "findFundamentalMat",
            "findEssentialMat",
            "recoverPose",
            "triangulatePoints",
            "undistortPoints",
          ]

          # Find the calib3d '' list start regardless of formatting:
          # e.g. calib3d = {'': [ ... ]} or calib3d={'':[
          m = re.search(r"calib3d\s*=\s*\{\s*['\"]\s*['\"]\s*:\s*\[", txt)
          if not m:
            raise SystemExit("Could not locate calib3d '' list start in opencv_js.config.py")

          insert_at = m.end()

          inject = "".join([f"\n        '{fn}'," for fn in need])
          txt2 = txt[:insert_at] + inject + txt[insert_at:]

          cfg.write_text(txt2, encoding="utf-8")

          print("Injected into calib3d whitelist:", need)
          print("--- calib3d snippet (proof) ---")
          print(txt2[m.start():m.start()+400])
          print("------------------------------")
          PY

          # show proof in workflow logs
          grep -n "findFundamentalMat" opencv/platforms/js/opencv_js.config.py || true
          grep -n "recoverPose" opencv/platforms/js/opencv_js.config.py || true
          grep -n "triangulatePoints" opencv/platforms/js/opencv_js.config.py || true

      - name: Build OpenCV.js (wasm, separate .wasm file)
        run: |
          # Reduce parallelism to avoid runner flakiness
          export MAKEFLAGS="-j2"

          cd opencv
          emcmake python3 ./platforms/js/build_js.py ../build_epipolar \
            --build_wasm \
            --disable_single_file \
            --clean_build_dir \
            --cmake_option="-DCMAKE_BUILD_TYPE=Release" \
            --cmake_option="-DCMAKE_CXX_STANDARD=17" \
            --cmake_option="-DBUILD_LIST=core,imgproc,features2d,video,calib3d" \
            --cmake_option="-DWITH_PTHREADS=OFF"

      - name: Package artifacts into repo folder structure
        run: |
          mkdir -p assets/opencv
          cp build_epipolar/bin/opencv.js assets/opencv/opencv.js
          cp build_epipolar/bin/opencv_js.wasm assets/opencv/opencv_js.wasm
          ls -lah assets/opencv

      - name: Verify epipolar exports exist in built opencv.js
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const s = fs.readFileSync('assets/opencv/opencv.js','utf8');
          const need = ['findFundamentalMat','recoverPose','triangulatePoints'];
          const missing = need.filter(k => !s.includes(k));
          if (missing.length) {
            console.error('Missing exports in opencv.js:', missing.join(', '));
            process.exit(1);
          }
          console.log('OK: opencv.js contains:', need.join(', '));
          NODE

      - name: Upload OpenCV.js artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-epipolar-build
          path: assets/opencv
