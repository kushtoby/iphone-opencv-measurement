<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Planar Measurement</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#111;color:#eee}
  .wrap{max-width:1100px;margin:0 auto;padding:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  button,input{font:inherit;padding:10px 12px;border-radius:10px;border:1px solid #444;background:#222;color:#eee}
  button.primary{background:#0b6efd;border-color:#0b6efd}
  button:disabled{opacity:.45}
  .panel{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px;margin-bottom:10px}
  #canvas{width:100%;height:auto;max-height:72vh;background:#000;border-radius:12px;touch-action:none}
  #out.ok{color:#9df59d} #out.warn{color:#ffd27f}
  table{width:100%;border-collapse:collapse} th,td{border:1px solid #333;padding:6px;text-align:left}
  pre{white-space:pre-wrap;max-height:220px;overflow:auto;margin:0}
  .small{font-size:.92rem;color:#bdbdbd}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="row">
      <button id="startBtn" class="primary" onclick="startCamera()">Start</button>
      <button id="freezeBtn" class="primary" onclick="freezeFrame()" disabled>Freeze</button>
      <button id="resumeBtn" onclick="resumeLive()" disabled>Resume</button>
      <button id="roiBtn" onclick="beginRoi()" disabled>ROI</button>
      <button id="p1Btn" onclick="beginPoint('p1')" disabled>P1</button>
      <button id="p2Btn" onclick="beginPoint('p2')" disabled>P2</button>
      <button id="computeBtn" class="primary" onclick="computeMeasurement()" disabled>Compute</button>
      <button onclick="clearMarks()">Clear marks</button>
      <button onclick="clearResults()">Clear results</button>
      <label>Truth mm <input id="truthMm" type="number" step="0.1" style="width:110px"></label>
      <label>Refine px <input id="refinePx" type="number" step="1" value="18" style="width:80px"></label>
    </div>
    <div id="out" class="small">Place the board in the same plane as the dimension you want to measure.</div>
    <div class="row small">
      <div id="cameraStatus">camera: off</div>
      <div id="boardStatus">board: not solved</div>
      <div id="actionStatus">action: none</div>
    </div>
  </div>

  <div class="panel">
    <video id="video" playsinline muted style="display:none"></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>#</th><th>Measured</th><th>Truth</th><th>% error</th><th>Board pts</th></tr></thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <div class="panel"><pre id="log"></pre></div>
</div>

<script src="./cv.js"></script>
<script src="./aruco.js"></script>
<script>
'use strict';

const BOARD = {
  dictionary: 'ARUCO',
  ids: [12,13,14,15,16,17,18,19],
  markerSizeMm: 50,
  gapMm: 10,
  // plane coordinates in mm, origin at board top-left, x right, y down
  centers: {
    12:[25,25], 13:[85,25], 14:[145,25],
    15:[25,85], 16:[85,85], 17:[145,85],
    18:[25,145],19:[85,145]
  }
};

let detector=null, streaming=false, frozen=false, rafId=0;
let liveMarkers=[], frozenFrame=null, frozenMarkers=[];
let Himg2plane=null;
let current={roi:null,p1:null,p2:null};
let actionMode=null, dragStart=null, dragRect=null;
let results=[];

const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

function log(msg){ const el=document.getElementById('log'); const t=new Date().toLocaleTimeString(); el.textContent=`[${t}] ${msg}\n`+el.textContent; }
function setOut(msg, cls=''){ const el=document.getElementById('out'); el.className='small '+cls; el.textContent=msg; }
function setStatus(id, txt){ document.getElementById(id).textContent=txt; }
function round(v,n=2){ return Number(v).toFixed(n); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function ensureCanvasSize(w,h){ if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; } }
function captureCurrentFrame(){ const w=video.videoWidth,h=video.videoHeight; const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h; const tctx=tmp.getContext('2d',{willReadFrequently:true}); tctx.drawImage(video,0,0,w,h); return {width:w,height:h,imageData:tctx.getImageData(0,0,w,h)}; }
function imageDataToCanvasImage(frame,targetCtx){ const cnv=document.createElement('canvas'); cnv.width=frame.width; cnv.height=frame.height; cnv.getContext('2d').putImageData(frame.imageData,0,0); targetCtx.drawImage(cnv,0,0); }
function getCanvasPoint(evt){ const rect=canvas.getBoundingClientRect(); const sx=canvas.width/rect.width, sy=canvas.height/rect.height; return {x:(evt.clientX-rect.left)*sx, y:(evt.clientY-rect.top)*sy}; }
function norm2(v){ return Math.hypot(v.x,v.y); }
function dist2(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function normalizeBox(a,b){ const x=Math.min(a.x,b.x), y=Math.min(a.y,b.y); return {x, y, w:Math.abs(a.x-b.x), h:Math.abs(a.y-b.y)}; }
function pointInRect(p,r){ return r && p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function sortCornersClockwise(corners){ const sums=corners.map(p=>p.x+p.y), diffs=corners.map(p=>p.x-p.y); const tl=corners[sums.indexOf(Math.min(...sums))]; const br=corners[sums.indexOf(Math.max(...sums))]; const tr=corners[diffs.indexOf(Math.max(...diffs))]; const bl=corners[diffs.indexOf(Math.min(...diffs))]; return [tl,tr,br,bl]; }
function markerPlaneCorners(id){ const c=BOARD.centers[id]; if(!c) return null; const s=BOARD.markerSizeMm/2; return [ {x:c[0]-s,y:c[1]-s}, {x:c[0]+s,y:c[1]-s}, {x:c[0]+s,y:c[1]+s}, {x:c[0]-s,y:c[1]+s} ]; }
function transpose(A){ return A[0].map((_,c)=>A.map(r=>r[c])); }
function matMul(A,B){ const rows=A.length, cols=B[0].length, inner=B.length; const C=Array.from({length:rows},()=>Array(cols).fill(0)); for(let r=0;r<rows;r++){ for(let c=0;c<cols;c++){ let s=0; for(let k=0;k<inner;k++) s+=A[r][k]*B[k][c]; C[r][c]=s; } } return C; }
function matVecMul(A,x){ return A.map(row=>row.reduce((s,v,i)=>s+v*x[i],0)); }
function solveLinear(A,b){ const n=A.length; const M=A.map((row,i)=>row.slice().concat([b[i]])); for(let col=0; col<n; col++){ let piv=col; for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r; if(Math.abs(M[piv][col])<1e-12) return null; if(piv!==col){ const tmp=M[col]; M[col]=M[piv]; M[piv]=tmp; } const div=M[col][col]; for(let c=col;c<=n;c++) M[col][c]/=div; for(let r=0;r<n;r++){ if(r===col) continue; const f=M[r][col]; for(let c=col;c<=n;c++) M[r][c]-=f*M[col][c]; } } return M.map(row=>row[n]); }
function solveHomographyImageToPlane(corresp){
  if(corresp.length<4) return null;
  const A=[], b=[];
  for(const q of corresp){
    const x=q.img.x, y=q.img.y, X=q.plane.x, Y=q.plane.y;
    A.push([x,y,1,0,0,0,-X*x,-X*y]); b.push(X);
    A.push([0,0,0,x,y,1,-Y*x,-Y*y]); b.push(Y);
  }
  const At=transpose(A), AtA=matMul(At,A), Atb=matVecMul(At,b);
  const h=solveLinear(AtA,Atb);
  if(!h) return null;
  return [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}
function transformPoint2D(p,H){ const w=H[2][0]*p.x+H[2][1]*p.y+H[2][2]; if(Math.abs(w)<1e-9) return null; return { x:(H[0][0]*p.x+H[0][1]*p.y+H[0][2])/w, y:(H[1][0]*p.x+H[1][1]*p.y+H[1][2])/w }; }
function detectMarkers(frame){ try{ return detector.detect(frame.imageData)||[]; }catch(e){ log('[detect] '+(e.message||e)); return []; } }
function buildBoardHomography(markers){
  const corr=[];
  for(const m of markers){
    const id=Number(m.id); if(!BOARD.ids.includes(id)) continue;
    const imgCorners=sortCornersClockwise(m.corners.map(c=>({x:c.x,y:c.y})));
    const planeCorners=markerPlaneCorners(id); if(!planeCorners) continue;
    for(let i=0;i<4;i++) corr.push({img:imgCorners[i], plane:planeCorners[i]});
  }
  if(corr.length<16) return {H:null,count:corr.length/4};
  return {H:solveHomographyImageToPlane(corr), count:corr.length/4};
}
function refinePoint(p){
  if(!frozenFrame) return p;
  const r=Math.max(2, parseInt(document.getElementById('refinePx').value||'18',10));
  const x0=Math.max(1,Math.floor(p.x-r)), y0=Math.max(1,Math.floor(p.y-r));
  const x1=Math.min(frozenFrame.width-2,Math.ceil(p.x+r)), y1=Math.min(frozenFrame.height-2,Math.ceil(p.y+r));
  const data=frozenFrame.imageData.data; const w=frozenFrame.width;
  let best=null, bestScore=-1;
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      if(current.roi && !pointInRect({x,y}, current.roi)) continue;
      const idx=(y*w+x)*4;
      const g=(data[idx]+data[idx+1]+data[idx+2])/3;
      const idxL=(y*w+(x-1))*4, idxR=(y*w+(x+1))*4, idxU=((y-1)*w+x)*4, idxD=((y+1)*w+x)*4;
      const gL=(data[idxL]+data[idxL+1]+data[idxL+2])/3, gR=(data[idxR]+data[idxR+1]+data[idxR+2])/3;
      const gU=(data[idxU]+data[idxU+1]+data[idxU+2])/3, gD=(data[idxD]+data[idxD+1]+data[idxD+2])/3;
      const gx=gR-gL, gy=gD-gU; const score=gx*gx+gy*gy;
      const dist=(x-p.x)*(x-p.x)+(y-p.y)*(y-p.y);
      const weighted=score-0.15*dist;
      if(weighted>bestScore){ bestScore=weighted; best={x,y}; }
    }
  }
  return best||p;
}
function updateButtons(){
  document.getElementById('freezeBtn').disabled=!streaming||frozen;
  document.getElementById('resumeBtn').disabled=!frozen;
  document.getElementById('roiBtn').disabled=!frozen;
  document.getElementById('p1Btn').disabled=!frozen;
  document.getElementById('p2Btn').disabled=!frozen;
  document.getElementById('computeBtn').disabled=!(frozen && Himg2plane && current.p1 && current.p2);
}
function drawMarkers(markers, color='#00e5ff'){ ctx.lineWidth=3; ctx.strokeStyle=color; ctx.fillStyle=color; for(const m of markers){ const c=sortCornersClockwise(m.corners.map(q=>({x:q.x,y:q.y}))); ctx.beginPath(); ctx.moveTo(c[0].x,c[0].y); for(let i=1;i<4;i++) ctx.lineTo(c[i].x,c[i].y); ctx.closePath(); ctx.stroke(); ctx.fillText(String(m.id), c[0].x+4, c[0].y-4); } }
function render(){
  if(streaming && !frozen){ ctx.drawImage(video,0,0,canvas.width,canvas.height); drawMarkers(liveMarkers,'#00e5ff'); }
  else if(frozen && frozenFrame){ imageDataToCanvasImage(frozenFrame, ctx); drawMarkers(frozenMarkers,'#00ff88'); }
  else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  if(current.roi){ ctx.strokeStyle='#ffd54f'; ctx.lineWidth=3; ctx.strokeRect(current.roi.x,current.roi.y,current.roi.w,current.roi.h); }
  if(dragRect){ ctx.strokeStyle='#ff9800'; ctx.lineWidth=2; ctx.strokeRect(dragRect.x,dragRect.y,dragRect.w,dragRect.h); }
  for(const key of ['p1','p2']){ const p=current[key]; if(!p) continue; ctx.fillStyle=key==='p1'?'#ff5252':'#8bc34a'; ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#fff'; ctx.fillText(key.toUpperCase(), p.x+9, p.y-9); }
}
function renderLoop(){
  if(!streaming) return;
  if(!frozen){
    const now=performance.now();
    if(now-(renderLoop.lastDetect||0)>220 && video.videoWidth>0){
      try{ const frame=captureCurrentFrame(); ensureCanvasSize(frame.width,frame.height); liveMarkers=detectMarkers(frame); setStatus('boardStatus', `board: live ids ${liveMarkers.filter(m=>BOARD.ids.includes(Number(m.id))).map(m=>m.id).join(', ')||'none'}`); renderLoop.lastDetect=now; }catch(e){}
    }
    render();
    rafId=requestAnimationFrame(renderLoop);
  }
}
async function startCamera(){
  try{
    if(typeof AR==='undefined' || typeof AR.Detector!=='function'){ setOut('aruco.js not loaded correctly','warn'); log('[boot] AR.Detector missing'); return; }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ setOut('Camera API unavailable','warn'); return; }
    detector = new AR.Detector({ dictionaryName: BOARD.dictionary });
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:'environment'}, width:{ideal:1080}, height:{ideal:1920} }, audio:false });
    video.srcObject=stream;
    await video.play();
    ensureCanvasSize(video.videoWidth, video.videoHeight);
    streaming=true; frozen=false; liveMarkers=[]; frozenFrame=null; Himg2plane=null; current={roi:null,p1:null,p2:null};
    setStatus('cameraStatus', `camera: ${video.videoWidth}x${video.videoHeight}`);
    setOut('Camera started. Align the board and press Freeze.','ok');
    updateButtons();
    cancelAnimationFrame(rafId); renderLoop();
    log('[cam] started');
  }catch(err){ setOut('Camera start failed: '+(err.message||err), 'warn'); log('[cam] '+(err.message||err)); }
}
function freezeFrame(){
  if(!streaming) return;
  frozenFrame=captureCurrentFrame();
  frozen=true;
  frozenMarkers=detectMarkers(frozenFrame).filter(m=>BOARD.ids.includes(Number(m.id)));
  const solved=buildBoardHomography(frozenMarkers);
  Himg2plane=solved.H;
  if(Himg2plane){ setOut(`Frame frozen. Board solved from ${solved.count} markers. Draw ROI and click P1/P2.`, 'ok'); setStatus('boardStatus', `board: solved (${solved.count} markers)`); log('[board] solved from ids '+frozenMarkers.map(m=>m.id).join(', ')); }
  else { setOut(`Board solve failed. Need at least 4 visible board markers.`, 'warn'); setStatus('boardStatus', 'board: not solved'); log('[board] solve failed'); }
  updateButtons(); render();
}
function resumeLive(){ frozen=false; frozenFrame=null; frozenMarkers=[]; Himg2plane=null; current={roi:null,p1:null,p2:null}; actionMode=null; dragStart=null; dragRect=null; setOut('Live resumed.'); setStatus('boardStatus','board: live'); updateButtons(); renderLoop(); }
function beginRoi(){ actionMode='roi'; setStatus('actionStatus','action: draw ROI'); }
function beginPoint(which){ actionMode=which; setStatus('actionStatus',`action: click ${which.toUpperCase()}`); }
function clearMarks(){ current={roi:null,p1:null,p2:null}; actionMode=null; dragStart=null; dragRect=null; updateButtons(); render(); setOut('Cleared marks.'); }
function computeMeasurement(){
  if(!Himg2plane || !current.p1 || !current.p2){ setOut('Need board + P1 + P2', 'warn'); return; }
  const P1=transformPoint2D(current.p1, Himg2plane);
  const P2=transformPoint2D(current.p2, Himg2plane);
  if(!P1 || !P2){ setOut('Homography transform failed','warn'); return; }
  const mm=Math.hypot(P2.x-P1.x, P2.y-P1.y);
  const truth=parseFloat(document.getElementById('truthMm').value||'');
  const err=Number.isFinite(truth)&&truth>0? (100*Math.abs(mm-truth)/truth) : null;
  results.unshift({mm,truth,err,boardPts:frozenMarkers.length*4});
  renderResults();
  setOut(`Measured ${round(mm,2)} mm`, 'ok');
  log(`[measure] mm=${round(mm,2)} | P1plane=(${round(P1.x,1)},${round(P1.y,1)}) P2plane=(${round(P2.x,1)},${round(P2.y,1)})`);
}
function renderResults(){ const tb=document.getElementById('resultsBody'); tb.innerHTML=results.map((r,i)=>`<tr><td>${i+1}</td><td>${round(r.mm,2)} mm</td><td>${Number.isFinite(r.truth)?round(r.truth,2)+' mm':'--'}</td><td>${r.err==null?'--':round(r.err,2)+'%'}</td><td>${r.boardPts}</td></tr>`).join(''); }
function clearResults(){ results=[]; renderResults(); }

canvas.addEventListener('pointerdown', e=>{
  if(!frozen) return;
  const p=getCanvasPoint(e);
  if(actionMode==='roi'){ dragStart=p; dragRect={x:p.x,y:p.y,w:0,h:0}; render(); return; }
  if(actionMode==='p1' || actionMode==='p2'){
    const rp=refinePoint(p); current[actionMode]=rp; setOut(`${actionMode.toUpperCase()} set`, 'ok'); log(`[click] ${actionMode} raw=(${round(p.x,1)},${round(p.y,1)}) refined=(${round(rp.x,1)},${round(rp.y,1)})`); actionMode=null; setStatus('actionStatus','action: none'); updateButtons(); render();
  }
});
canvas.addEventListener('pointermove', e=>{
  if(actionMode==='roi' && dragStart){ const p=getCanvasPoint(e); dragRect=normalizeBox(dragStart,p); render(); }
});
canvas.addEventListener('pointerup', e=>{
  if(actionMode==='roi' && dragStart){ const p=getCanvasPoint(e); current.roi=normalizeBox(dragStart,p); dragStart=null; dragRect=null; actionMode=null; setStatus('actionStatus','action: none'); setOut('ROI set','ok'); updateButtons(); render(); }
});

log('[boot] planar app ready');
updateButtons();
</script>
</body>
</html>
